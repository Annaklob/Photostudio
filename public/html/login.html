<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вхід | LUMINA.STUDIO</title>

    <link rel="stylesheet" href="/css/login.css">

</head>

<body>

  <header class="header">
    <a href="index.html" class="logo">LUMINA.STUDIO</a>

    <nav class="nav">
      <a href="index.html">Головна</a>
      <a href="services.html">Послуги</a>
      <a href="halls.html">Зали</a>
      <a href="photographers.html">Фотографи</a>
      <a href="contacts.html">Контакти</a>
      <a href="login.html" class="active">Увійти</a>
    </nav>
  </header>

  <main class="page">
    <div class="login-box">
      <h1>Вхід</h1>
      <p class="subtitle">Увійдіть у систему LUMINA.STUDIO</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Введіть пароль"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="login-btn" id="loginBtn">Увійти</button>

        <div class="message" id="messageBox"></div>
      </form>

      <div class="register-link">
        Немає акаунта клієнта?
        <a href="register.html">Зареєструватися</a>
      </div>
    </div>
  </main>

  <script src="/js/auth-session.js"></script>
<script src="/js/site-dialogs.js"></script>
<script src="/js/login.js"></script>


  <script src="/js/hall-select-cleanup.js"></script>
</body>
</html>
