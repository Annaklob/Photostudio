<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Реєстрація | LUMINA.STUDIO</title>

    <link rel="stylesheet" href="/css/register.css">

</head>

<body>

  <header class="header">
    <a href="index.html" class="logo">LUMINA.STUDIO</a>

    <nav class="nav">
      <a href="index.html">Головна</a>
      <a href="services.html">Послуги</a>
      <a href="halls.html">Зали</a>
      <a href="photographers.html">Фотографи</a>
      <a href="contacts.html">Контакти</a>
      <a href="login.html">Увійти</a>
    </nav>
  </header>

  <main class="page">
    <div class="register-box">
      <h1>Реєстрація</h1>
      <p class="subtitle">
        Створіть акаунт клієнта, щоб бронювати фотосесії та переглядати свої записи.
      </p>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Ім’я та прізвище</label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Наприклад: Марія Коваль"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label for="phone">Телефон</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="+380..."
            autocomplete="tel"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Мінімум 6 символів"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="form-group">
          <label for="confirmPassword">Повторіть пароль</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Повторіть пароль"
            autocomplete="new-password"
            required
          >
        </div>

        <button type="submit" class="register-btn" id="registerBtn">Зареєструватися</button>

        <div class="message" id="messageBox"></div>
      </form>


      <div class="login-link">
        Уже маєте акаунт?
        <a href="login.html">Увійти</a>
      </div>
    </div>
  </main>

  <script src="/js/auth-session.js"></script>
<script src="/js/site-dialogs.js"></script>
<script src="/js/register.js"></script>


  <script src="/js/hall-select-cleanup.js"></script>
</body>
</html>
